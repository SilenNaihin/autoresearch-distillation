# Smoke test — 1 batch, 1 step
# Usage: bash scripts/run_smoke_test.sh

defaults:
  - autoresearch_sdpo
  - _self_

data:
  train_batch_size: 1

actor_rollout_ref:
  model:
    path: Qwen/Qwen3-4B
  actor:
    ppo_mini_batch_size: 1
    ulysses_sequence_parallel_size: 1
    fsdp_config:
      ulysses_sequence_parallel_size: 1
  rollout:
    tensor_model_parallel_size: 1
    agent:
      num_workers: 1

critic:
  model:
    path: Qwen/Qwen3-4B

trainer:
  experiment_name: qwen3-4b-sdpo-smoke-test
  n_gpus_per_node: 1
  total_epochs: 1
  save_freq: -1
