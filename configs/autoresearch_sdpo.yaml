# SDPO config for autoresearch on 2 GPUs (colocated vLLM + FSDP2)
# Inherits from sdpo.yaml -> ppo_trainer.yaml -> user.yaml
# Usage: bash scripts/run_training.sh

defaults:
  - sdpo
  - _self_

max_model_len: 65536

data:
  train_files: ["${vars.dir}/data/autoresearch/train.parquet"]
  val_files: ["${vars.dir}/data/autoresearch/test.parquet"]
  train_batch_size: 1
  max_prompt_length: 16384
  max_response_length: 49152
  apply_chat_template_kwargs: {"enable_thinking": true}
  return_raw_chat: True
  filter_overlong_prompts: True
  trust_remote_code: True
  shuffle: True

actor_rollout_ref:
  model:
    path: Qwen/Qwen3-14B
    trust_remote_code: True
    override_config:
      attn_implementation: flash_attention_2
  actor:
    ppo_micro_batch_size_per_gpu: 1
    ppo_mini_batch_size: 1
    ppo_max_token_len_per_gpu: ${max_model_len}
    use_dynamic_bsz: False
    ulysses_sequence_parallel_size: 2
    strategy: fsdp2
    fsdp_config:
      strategy: fsdp2
      offload_policy: true
      ulysses_sequence_parallel_size: 2
    policy_loss:
      loss_mode: sdpo
    self_distillation:
      teacher_update_rate: 0.05
      max_reprompt_len: 10240
      is_clip: 2.0
      alpha: 0.5
      distillation_topk: 100
      success_reward_threshold: 0.0
      dont_reprompt_on_self_success: True
      include_environment_feedback: True
      environment_feedback_only_without_solution: False
      feedback_template: |-

        The following is feedback from a previous attempt at this problem:

        {feedback_raw}
      reprompt_template: |-

        {prompt}{solution}{feedback}

        Using the information above, provide the best possible solution.
    optim:
      lr: 1e-6
      lr_warmup_steps: 5
  rollout:
    name: vllm
    n: 1
    temperature: 1.0
    tensor_model_parallel_size: 2
    gpu_memory_utilization: 0.85
    max_model_len: ${max_model_len}
    max_num_batched_tokens: ${max_model_len}
    calculate_log_probs: True
    engine_kwargs:
      vllm:
        hf_overrides:
          rope_scaling:
            rope_type: yarn
            factor: 2.0
            original_max_position_embeddings: 32768
    multi_turn:
      enable: True
      max_user_turns: 10
      max_assistant_turns: 10
      max_parallel_calls: 1
      max_tool_response_length: 10000
      tool_response_truncate_side: right
      tool_config_path: ${vars.dir}/configs/bash_tool_config.yaml
      format: hermes
      interaction_config_path: null
    agent:
      num_workers: 1
      default_agent_loop: autoresearch_agent
      agent_loop_config_path: ${vars.dir}/configs/agent_loops.yaml

algorithm:
  adv_estimator: grpo
  norm_adv_by_std_in_grpo: False
  use_kl_in_reward: False
  rollout_correction:
    rollout_is: token
    rollout_is_threshold: 2.0

critic:
  strategy: fsdp2
  ulysses_sequence_parallel_size: 2
  use_dynamic_bsz: False
  ppo_micro_batch_size_per_gpu: 1
  fsdp_config:
    strategy: fsdp2
    ulysses_sequence_parallel_size: 2
  model:
    path: Qwen/Qwen3-14B

custom_reward_function:
  path: ${vars.dir}/reward.py

reward_model:
  use_reward_loop: False

trainer:
  project_name: autoresearch-sdpo
  experiment_name: qwen3-14b-sdpo
  n_gpus_per_node: 2
  nnodes: 1
  total_epochs: 1000
  test_freq: -1
  save_freq: 10
  max_actor_ckpt_to_keep: 3
  val_before_train: False
  critic_warmup: 0
  logger: ["console", "wandb"]
  default_local_dir: ${vars.ckpt_dir}/${trainer.experiment_name}
  rollout_data_dir: /data/rollout_dumps
  log_val_generations: 5
